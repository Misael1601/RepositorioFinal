name: Terraform Deploy

on:
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:

permissions:
  id-token: write      # requerido para autenticación OIDC con Azure
  contents: read
  pull-requests: write # para comentar el plan en el PR

env:
  TF_VERSION:   "1.9.8"
  WORKING_DIR:  terraform

  # Credenciales OIDC (sin passwords almacenadas)
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC:        "true"

  # Variables sensibles de Terraform (nunca van en dev.tfvars)
  TF_VAR_sql_admin_user:     ${{ secrets.SQL_ADMIN_USER }}
  TF_VAR_sql_admin_password: ${{ secrets.SQL_ADMIN_PASSWORD }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}"
          -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}"
          -backend-config="container_name=tfstate"
          -backend-config="key=pipeline-demo.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Get runner public IP
        id: ip
        run: echo "address=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        run: >
          terraform plan
          -var-file=dev.tfvars
          -var="my_ip_address=${{ steps.ip.outputs.address }}"
          -out=tfplan
          -no-color

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Workflow: \`${{ github.workflow }}\`, Commit: \`${{ github.sha }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Upload Plan Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production   # requiere aprobación manual en Settings > Environments
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}"
          -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}"
          -backend-config="container_name=tfstate"
          -backend-config="key=pipeline-demo.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
